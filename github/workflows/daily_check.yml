name: Daily Price Check

on:
  schedule:
    # This sets the "Wake Up" time to 8:00 AM UTC daily
    - cron: '0 8 * * *'
  workflow_dispatch: # This allows you to click a button to run it manually

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 pandas

      - name: Run script
        run: python main.py

      - name: Save Results
        # This part uploads your 'price_log.csv' so you can download it from GitHub
        uses: actions/upload-artifact@v4
        with:
          name: price-log
          path: price_log.csv
        
